apiVersion: kmm.sigs.x-k8s.io/v1beta1
kind: Module
metadata:
  name: moduleName
  namespace: moduleNamespace
spec:
  devicePlugin:
    serviceAccountName: "intel-gpu-operator-kmm-device-plugin"
    container:
      image: ""
      volumeMounts:
      - name: sys
        mountPath: /sys
    volumes:
    - name: sys
      hostPath:
        path: /sys
        type: Directory
