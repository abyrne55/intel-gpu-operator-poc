apiVersion: kmm.sigs.x-k8s.io/v1beta1
kind: Module
metadata:
  name: moduleName
  namespace: moduleNamespace
spec:
  moduleLoader:
    container:
      imagePullPolicy: Always
      modprobe:
        moduleName: xe
        firmwarePath: placeholder
      kernelMappings:
        - regexp: "^.+$"
          containerImage: driversImage
          inTreeModulesToRemove:
          - xe
          build:
            buildArgs:
              - name: DRIVERS_VERSION
                value: driversVersion
            dockerfileConfigMap:
              name: dockerfile
    serviceAccountName: "intel-gpu-operator-kmm-module-loader"
  selector:
    feature.node.kubernetes.io/pci-8086.present: "true"
  tolerations:
    - key: "some key"
      operator: Equal
      value: true
      effect: NoExecute
